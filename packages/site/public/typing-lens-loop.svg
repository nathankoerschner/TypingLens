<svg xmlns="http://www.w3.org/2000/svg" width="960" height="280" viewBox="0 0 960 280" role="img" aria-labelledby="title desc">
  <title id="title">Typing Lens practice loop</title>
  <desc id="desc">A four-step loop from local pattern data to targeted practice, retests, and fresh-text checks.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f3eee7"/>
    </linearGradient>
  </defs>
  <rect width="960" height="280" rx="10" fill="#f5f0ea"/>
  <g fill="none" stroke="#d8d2ca" stroke-width="1">
    <path d="M48 218h864"/>
    <path d="M48 64h864"/>
  </g>
  <g font-family="Geist Sans, Inter, Arial, sans-serif">
    <g transform="translate(58 86)">
      <rect width="182" height="96" rx="8" fill="url(#panel)" stroke="#d8d2ca"/>
      <circle cx="34" cy="34" r="16" fill="#e4f0ec"/>
      <path d="M27 34h14m-7-7v14" stroke="#3d8b7a" stroke-width="2" stroke-linecap="round"/>
      <text x="58" y="35" fill="#1c2420" font-size="17" font-weight="700">Real typing</text>
      <text x="24" y="69" fill="#5c6660" font-size="13">friction appears</text>
    </g>
    <g transform="translate(282 86)">
      <rect width="182" height="96" rx="8" fill="url(#panel)" stroke="#d8d2ca"/>
      <circle cx="34" cy="34" r="16" fill="#e4f0ec"/>
      <path d="M27 35h14m-10 6h6m-6-12h10" stroke="#3d8b7a" stroke-width="2" stroke-linecap="round"/>
      <text x="58" y="35" fill="#1c2420" font-size="17" font-weight="700">Local profile</text>
      <text x="24" y="69" fill="#5c6660" font-size="13">saved patterns</text>
    </g>
    <g transform="translate(506 86)">
      <rect width="182" height="96" rx="8" fill="url(#panel)" stroke="#d8d2ca"/>
      <circle cx="34" cy="34" r="16" fill="#e4f0ec"/>
      <path d="M34 24v20m-10-10h20" stroke="#3d8b7a" stroke-width="2" stroke-linecap="round"/>
      <text x="58" y="35" fill="#1c2420" font-size="17" font-weight="700">Practice</text>
      <text x="24" y="69" fill="#5c6660" font-size="13">one target at a time</text>
    </g>
    <g transform="translate(730 86)">
      <rect width="182" height="96" rx="8" fill="url(#panel)" stroke="#d8d2ca"/>
      <circle cx="34" cy="34" r="16" fill="#e4f0ec"/>
      <path d="M26 34l6 6 12-14" stroke="#3d8b7a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="58" y="35" fill="#1c2420" font-size="17" font-weight="700">Retest</text>
      <text x="24" y="69" fill="#5c6660" font-size="13">fresh text decides</text>
    </g>
    <g fill="#3d8b7a">
      <path d="M252 132h18l-6-6 2-2 10 10-10 10-2-2 6-6h-18z"/>
      <path d="M476 132h18l-6-6 2-2 10 10-10 10-2-2 6-6h-18z"/>
      <path d="M700 132h18l-6-6 2-2 10 10-10 10-2-2 6-6h-18z"/>
    </g>
    <text x="58" y="235" fill="#5c6660" font-size="14">Accuracy, correction cost, samples, and source IDs decide what progress can be shown.</text>
  </g>
</svg>
