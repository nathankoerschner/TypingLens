name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Swift tests
        run: swift test

      - name: Xcode app build
        run: xcodebuild -project TypingLens.xcodeproj -scheme TypingLens -configuration Debug -arch arm64 build
